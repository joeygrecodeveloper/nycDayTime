<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Time</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f0f0f;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      gap: 1rem;
      padding: 2rem 1rem;
    }

    .clock-container {
      text-align: center;
    }

    .label {
      color: #555;
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .time {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0f0f0;
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.02em;
      transform: scaleX(0.82);
      transform-origin: center;
      line-height: 1;
    }

    .time .colon {
      color: #444;
      font-size: 0.45em;
      animation: blink 1s step-start infinite;
      margin: 0 0.05em;
    }

    .period {
      color: #888;
      font-size: 0.22em;
      margin-left: 0.1em;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .sun-times {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-top: 1rem;
    }
    .sun-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }
    .sun-icon {
      font-size: 1.5rem;
    }
    .sun-label {
      font-family: Inter, sans-serif;
      font-weight: 200;
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.04em;
    }
    .sun-label--next {
      font-weight: 400;
      color: #e0e0e0;
    }
    .rain-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }
    .rain-icon {
      font-size: 0.9rem;
    }
    .rain-label {
      font-family: Inter, sans-serif;
      font-weight: 200;
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.04em;
    }

    .map-container {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    .map-label {
      color: #555;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    #worldMap {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid #222;
      border-radius: 4px;
    }

  
    #debug-panel {
      display: none;
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: rgba(20,20,20,0.92);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      z-index: 9999;
      font-family: Inter, sans-serif;
      font-size: 0.78rem;
      color: #ccc;
      min-width: 220px;
      backdrop-filter: blur(8px);
    }
    #debug-panel h4 {
      margin: 0 0 0.75rem;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #888;
      text-transform: uppercase;
    }
    #debug-panel label { display: block; margin-bottom: 0.5rem; }
    #debug-panel select, #debug-panel input {
      width: 100%;
      margin-top: 0.2rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 5px;
      color: #eee;
      padding: 0.3rem 0.4rem;
      font-size: 0.78rem;
    }
    #debug-apply {
      margin-top: 0.75rem;
      width: 100%;
      padding: 0.4rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      color: #eee;
      cursor: pointer;
      font-size: 0.78rem;
    }
    #debug-apply:hover { background: rgba(255,255,255,0.18); }
    #debug-reset {
      margin-top: 0.4rem;
      width: 100%;
      padding: 0.3rem;
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 0.72rem;
    }
    #debug-reset:hover { color: #999; }
  </style>
</head>

  <script>
    // ── Clock ────────────────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const estTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));

      let hours = estTime.getHours();
      const minutes = estTime.getMinutes();
      const period = hours >= 12 ? 'PM' : 'AM';

      hours = hours % 12 || 12;

      document.getElementById('hours').textContent = String(hours);
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('period').textContent = period;
    }

    // ── Sunrise / Sunset (Brooklyn, NY) ─────────────────────────────────────
    const BROOKLYN_LAT = 40.6501;
    const BROOKLYN_LON = -73.9496;

    function getSunriseSunset(date, lat, lon) {
      const rad = Math.PI / 180;
      const JD = Math.floor(date.getTime() / 86400000) + 2440587.5;
      const JC = (JD - 2451545) / 36525;

      const meanLon   = (280.46646 + JC * (36000.76983 + JC * 0.0003032)) % 360;
      const meanAnom  = 357.52911 + JC * (35999.05029 - JC * 0.0001537);
      const ecc       = 0.016708634 - JC * (0.000042037 + JC * 0.0000001267);
      const eqCtr     = Math.sin(meanAnom * rad) * (1.914602 - JC * (0.004817 + 0.000014 * JC))
                      + Math.sin(2 * meanAnom * rad) * (0.019993 - 0.000101 * JC)
                      + Math.sin(3 * meanAnom * rad) * 0.000289;
      const sunLon    = meanLon + eqCtr;
      const appLon    = sunLon - 0.00569 - 0.00478 * Math.sin((125.04 - 1934.136 * JC) * rad);
      const oblCorr   = (23 + (26 + (21.448 - JC * (46.8150 + JC * (0.00059 - JC * 0.001813))) / 60) / 60)
                      + 0.00256 * Math.cos((125.04 - 1934.136 * JC) * rad);
      const decl      = Math.asin(Math.sin(oblCorr * rad) * Math.sin(appLon * rad)) / rad;

      const y         = Math.tan((oblCorr / 2) * rad) ** 2;
      const eqTime    = 4 * (y * Math.sin(2 * meanLon * rad)
                      - 2 * ecc * Math.sin(meanAnom * rad)
                      + 4 * ecc * y * Math.sin(meanAnom * rad) * Math.cos(2 * meanLon * rad)
                      - 0.5 * y * y * Math.sin(4 * meanLon * rad)
                      - 1.25 * ecc * ecc * Math.sin(2 * meanAnom * rad)) / rad;

      const solarNoonMin = 720 - 4 * lon - eqTime;

      const cosHA = (Math.cos(90.833 * rad) / (Math.cos(lat * rad) * Math.cos(decl * rad)))
                  - Math.tan(lat * rad) * Math.tan(decl * rad);

      if (cosHA < -1 || cosHA > 1) return null; // polar day/night

      const HA = Math.acos(cosHA) / rad;

      const sunriseMin = solarNoonMin - 4 * HA;
      const sunsetMin  = solarNoonMin + 4 * HA;

      const base = Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate());
      return {
        sunrise: new Date(base + sunriseMin * 60000),
        sunset:  new Date(base + sunsetMin  * 60000)
      };
    }

    function formatSunTime(d) {
      const est = new Date(d.toLocaleString('en-US', { timeZone: 'America/New_York' }));
      let h = est.getHours();
      const m = String(est.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${m} ${ampm}`;
    }

    function updateSunTimes() {
      const now = new Date();
      const todayUTC = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
      const tomorrowUTC = new Date(todayUTC.getTime() + 86400000);

      const today    = getSunriseSunset(todayUTC,    BROOKLYN_LAT, BROOKLYN_LON);
      const tomorrow = getSunriseSunset(tomorrowUTC, BROOKLYN_LAT, BROOKLYN_LON);
      if (!today || !tomorrow) return;

      let nextSunrise, nextSunset;
      if (now < today.sunrise) {
        nextSunrise = today.sunrise;
        nextSunset  = today.sunset;
      } else if (now < today.sunset) {
        nextSunrise = tomorrow.sunrise;
        nextSunset  = today.sunset;
      } else {
        nextSunrise = tomorrow.sunrise;
        nextSunset  = tomorrow.sunset;
      }

      const srEl = document.getElementById('sunrise-time');
      const ssEl = document.getElementById('sunset-time');
      srEl.textContent = formatSunTime(nextSunrise);
      ssEl.textContent = formatSunTime(nextSunset);

      const sunriseIsNext = now < today.sunrise || now >= today.sunset;
      srEl.classList.toggle('sun-label--next', sunriseIsNext);
      ssEl.classList.toggle('sun-label--next', !sunriseIsNext);
    }

    updateClock();
    updateSunTimes();
    setInterval(() => { updateClock(); updateSunTimes(); }, 60000);

    // ── Weather text helpers ─────────────────────────────────────────────────────
    function formatWeatherTime(t) {
      const s = t.toLocaleTimeString('en-US', {
        timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit', hour12: true
      });
      // "3:00 PM" → "3 pm",  "9:30 PM" → "9:30 pm"
      return s.replace(/:00(?=\s)/, '').toLowerCase();
    }

    function getTimingLabel(t) {
      const h = parseInt(t.toLocaleTimeString('en-US', {
        timeZone: 'America/New_York', hour: '2-digit', hour12: false
      }).split(':')[0]);
      if (h < 4)  return 'early morning';
      if (h < 12) return 'morning';
      if (h < 16) return 'afternoon';
      return 'night';
    }

    function getWeatherPhrase(t, now) {
      const hoursAway = (t - now) / 3600000;
      const timeStr   = formatWeatherTime(t);
      const fmtDate   = d => d.toLocaleDateString('en-US', {
        timeZone: 'America/New_York', year: 'numeric', month: '2-digit', day: '2-digit'
      });
      const tHourET = parseInt(t.toLocaleTimeString('en-US', {
        timeZone: 'America/New_York', hour: '2-digit', hour12: false
      }).split(':')[0]);

      // P1 — within 3 hours
      if (hoursAway <= 1) return `within the next hour @ ${timeStr}`;
      if (hoursAway <= 3) return `in a few hours @ ${timeStr}`;

      const nowDate = fmtDate(now);
      const tDate   = fmtDate(t);
      const tmrDate = fmtDate(new Date(now.getTime() + 86400000));

      // P2/P3 — same calendar day
      if (tDate === nowDate) {
        return tHourET < 16 ? `today @ ${timeStr}` : `tonight @ ${timeStr}`;
      }
      // P4 — tomorrow
      if (tDate === tmrDate) {

    function resolveIcon(weatherArray) {
      if (!weatherArray?.length) return 'lightRain';
      const best = weatherArray
        .filter(w => w.weather !== 'none' && WEATHER_PRIORITY.includes(w.weather))
        .sort((a, b) => WEATHER_PRIORITY.indexOf(a.weather) - WEATHER_PRIORITY.indexOf(b.weather))[0];
      if (!best) return 'lightRain';
      const intensity = best.intensity ?? 'light';
      return ICON_MAP[best.weather]?.[intensity] ?? 'lightRain';
    }

    async function updateRain() {
      const row = document.getElementById('rain-row');
      const el  = document.getElementById('rain-time');
      const ico = document.getElementById('rain-icon');
      try {
        if (!nwsHourlyUrl) {
          const r = await fetch(NWS_POINTS_URL);
          const d = await r.json();
          nwsHourlyUrl = d.properties.forecastHourly;
        }
        const r = await fetch(nwsHourlyUrl);
        const d = await r.json();
        const periods = d.properties.periods;
        const now = new Date();
        const rainPeriod = periods.find(p => (p.probabilityOfPrecipitation?.value ?? 0) >= 30);
        if (!rainPeriod) { row.style.display = 'none'; return; }
        const t = new Date(rainPeriod.startTime);
        const hoursAway = (t - now) / 3600000;
        if (hoursAway > 168) { row.style.display = 'none'; return; }

        const iconName = resolveIcon(rainPeriod.weather);
        ico.src = ICON_SRCS[iconName] ?? '';

        el.textContent = getWeatherPhrase(t, now);
        row.style.display = 'flex';
      } catch (e) { row.style.display = 'none'; }
    }

    updateRain();
    setInterval(updateRain, 30 * 60 * 1000);

    // Update every 60 seconds
    drawMap(new Date());
    setInterval(() => drawMap(new Date()), 60000);
  
    // ── Debug panel ───────────────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.shiftKey && e.key === 'D') {
        const p = document.getElementById('debug-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
      }
    });

    function applyDebugWeather() {
      const weatherType = document.getElementById('dbg-type').value;
      const intensity   = document.getElementById('dbg-intensity').value;
      const pop         = parseInt(document.getElementById('dbg-pop').value, 10);
      const hoursAway   = parseFloat(document.getElementById('dbg-hours').value);

      const row = document.getElementById('rain-row');
      const el  = document.getElementById('rain-time');
      const ico = document.getElementById('rain-icon');

      if (pop < 30 || weatherType === 'none' || hoursAway > 168) {
        row.style.display = 'none';
        return;
      }

      const fakeWeather = [{ weather: weatherType, intensity }];
      const iconName = resolveIcon(fakeWeather);
      ico.src = ICON_SRCS[iconName] ?? '';

      const t = new Date(Date.now() + hoursAway * 3600000);
      const now = new Date();
      el.textContent = getWeatherPhrase(t, now);
      row.style.display = 'flex';
    }

    document.addEventListener('click', e => {
      if (e.target.id === 'debug-apply') applyDebugWeather();
      if (e.target.id === 'debug-reset') updateRain();
    });

  </script>
  <div id="debug-panel">
    <h4>Weather Debug</h4>
    <label>Weather type
      <select id="dbg-type">
        <option value="none">— none (hide widget) —</option>
        <option value="thunderstorms">thunderstorms</option>
        <option value="hail">hail</option>
        <option value="freezing_rain">freezing_rain</option>
        <option value="freezing_drizzle">freezing_drizzle</option>
        <option value="sleet">sleet</option>
        <option value="ice_pellets">ice_pellets</option>
        <option value="ice_crystals">ice_crystals</option>
        <option value="snow">snow</option>
        <option value="snow_showers">snow_showers</option>
        <option value="rain" selected>rain</option>
        <option value="rain_showers">rain_showers</option>
        <option value="drizzle">drizzle</option>
      </select>
    </label>
    <label>Intensity
      <select id="dbg-intensity">
        <option value="light" selected>light</option>
        <option value="moderate">moderate</option>
        <option value="heavy">heavy</option>
      </select>
    </label>
    <label>Probability of precipitation (%)
      <select id="dbg-pop">
        <option value="0">0% — hide</option>
        <option value="20">20% — hide</option>
        <option value="30" selected>30% — show</option>
        <option value="50">50%</option>
        <option value="80">80%</option>
        <option value="100">100%</option>
      </select>
    </label>
    <label>Hours away
      <select id="dbg-hours">
        <option value="1">1h — today</option>
        <option value="12" selected>12h — today</option>
        <option value="23">23h — today/tomorrow boundary</option>
        <option value="36">36h — tomorrow</option>
        <option value="48">48h — tomorrow/day boundary</option>
        <option value="72">72h — day of week</option>
        <option value="169">169h — beyond 7d (hide)</option>
      </select>
    </label>
    <button id="debug-apply">Apply</button>
    <button id="debug-reset">Reset to live data</button>
  </div>
</body>
